<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TrackerYA</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin:0;
    background:linear-gradient(180deg,#0f0f0f,#1a1a1a);
    font-family: 'Segoe UI', sans-serif;
    color:white;
}

.wrapper {
    padding:20px;
}

.user-id {
    text-align:center;
    font-size:14px;
    opacity:0.6;
    margin-bottom:20px;
}

.card {
    background:linear-gradient(145deg,#1f1f1f,#181818);
    border-radius:18px;
    padding:20px;
    margin-bottom:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.card-title {
    font-size:14px;
    opacity:0.7;
    margin-bottom:10px;
}

.big-number {
    font-size:42px;
    font-weight:700;
}

.league {
    display:flex;
    align-items:center;
    font-size:22px;
    font-weight:600;
}

.league span {
    margin-right:8px;
    font-size:28px;
}

</style>
</head>
<body>

<div class="wrapper">

    <div class="user-id" id="tgid">
        ID: ...
    </div>

    <div class="card">
        <div class="card-title">🔥 Current Streak</div>
        <div class="big-number" id="streak">...</div>
    </div>

    <div class="card">
        <div class="card-title">⚡ XP</div>
        <div class="big-number" id="xp">...</div>
    </div>

    <div class="card">
        <div class="card-title">🏆 League</div>
        <div class="league">
            <span id="leagueEmoji">...</span>
            <div id="leagueName">...</div>
        </div>
    </div>

</div>

<script>
const tg = window.Telegram?.WebApp;

if (tg) {
    tg.expand();
    load();
}

async function load() {
    const response = await fetch("/api/dashboard", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ initData: tg.initData })
    });

    const data = await response.json();

    document.getElementById("tgid").innerText =
        "ID: " + data.telegram_user_id;

    const stats = data.stats;

    if (stats) {
        document.getElementById("streak").innerText =
            stats.current_streak ?? 0;

        document.getElementById("xp").innerText =
            Math.floor(stats.xp ?? 0);

        document.getElementById("leagueName").innerText =
            stats.league ?? "—";

        document.getElementById("leagueEmoji").innerText =
            stats.league_emoji ?? "";
    }
}
</script>

</body>
</html>
