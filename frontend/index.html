<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TrackerYA</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
    margin:0;
    padding:16px;
    background:#0f0f10;
    color:white;
    font-family:Arial;
}

/* USER */

.user{
    font-size:14px;
    margin-bottom:10px;
    opacity:0.8;
}

/* CARD */

.card{
    background:#1b1b1f;
    border-radius:16px;
    padding:14px;
}

/* GRID */

.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

/* BOX */

.stat{
    background:#232328;
    border-radius:12px;
    padding:14px;
    text-align:center;
}

/* LABEL */

.label{
    font-size:12px;
    opacity:0.7;
    margin-bottom:6px;
}

/* VALUE */

.value{
    font-size:24px;
    font-weight:700;
}

</style>
</head>

<body>

<div class="user" id="username">...</div>

<div class="card">

<div class="stats">

<div class="stat">
<div class="label">🔥 Streak</div>
<div class="value" id="streak">-</div>
</div>

<div class="stat">
<div class="label">💎 EXP</div>
<div class="value" id="xp">-</div>
</div>

<div class="stat">
<div class="label">🏆 League</div>
<div class="value" id="league">-</div>
</div>

</div>

</div>


<script>

const tg = window.Telegram?.WebApp;

if(!tg){

    document.body.innerHTML = "Open inside Telegram";

}else{

    tg.expand();

    const user = tg.initDataUnsafe?.user;

    if(user){

        document.getElementById("username").innerText =
            user.first_name + " (" + user.id + ")";

    }

    loadDashboard();
}



async function loadDashboard(){

    try{

        const response = await fetch("https://youramb.digital/api/dashboard",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                initData: tg.initData
            })

        });

        const data = await response.json();

        document.getElementById("streak").innerText =
            data.streak ?? 0;

        document.getElementById("xp").innerText =
            Math.floor(data.xp ?? 0);

        document.getElementById("league").innerText =
            data.league ?? "-";

    }catch(err){

        console.log(err);

    }

}

</script>

</body>
</html>
