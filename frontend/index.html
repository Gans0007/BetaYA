<script>

const tg = window.Telegram.WebApp
tg.expand()

let chart
let historyData = []

loadDashboard()
loadHistory()



/* ---------------------------
Загрузка статистики
--------------------------- */

async function loadDashboard(){

const response = await fetch("https://youramb.digital/api/dashboard",{

method:"POST",
headers:{ "Content-Type":"application/json" },

body:JSON.stringify({
initData: tg.initData
})

})

const data = await response.json()

document.getElementById("streak").innerText = data.streak ?? 0
document.getElementById("xp").innerText = Math.floor(data.xp ?? 0)
document.getElementById("league").innerText = data.league ?? "-"

}



/* ---------------------------
Загрузка истории привычек
--------------------------- */

async function loadHistory(){

const response = await fetch(
"https://youramb.digital/api/habit_history",
{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
initData: tg.initData
})
})

const data = await response.json()

historyData = data.history

drawChart(7)

}



/* ---------------------------
Получить последние дни
--------------------------- */

function getDays(n){

const days=[]

for(let i=n-1;i>=0;i--){

const d=new Date()
d.setDate(d.getDate()-i)

days.push(d.toISOString().slice(0,10))

}

return days

}



/* ---------------------------
Строим кривую привычки
--------------------------- */

function buildSeries(days, confirmations){

let value=1
const series=[]

days.forEach(day=>{

const confirmed = confirmations.includes(day)

if(confirmed){
value += 1
}else{
value = Math.max(0,value-1)
}

series.push(value)

})

return series

}



/* ---------------------------
Рисуем график
--------------------------- */

function drawChart(period){

const days = getDays(period)

const labels = days.map(d => d.slice(5))

const habits = {}

historyData.forEach(row=>{

if(!habits[row.habit_name])
habits[row.habit_name]=[]

if(row.confirmed)
habits[row.habit_name].push(row.day)

})

const datasets = Object.keys(habits).map(name=>{

const confirmations = habits[name]

return{
label:name,
data:buildSeries(days,confirmations),
tension:0.4
}

})

if(chart) chart.destroy()

chart = new Chart(document.getElementById("habitsChart"),{

type:"line",

data:{
labels:labels,
datasets:datasets
},

options:{
responsive:true,
maintainAspectRatio:false
}

})

}



/* ---------------------------
Переключение периодов
--------------------------- */

document.querySelectorAll(".period-switch button").forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll(".period-switch button")
.forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

let period = btn.dataset.period

if(period=="7") drawChart(7)
if(period=="30") drawChart(30)
if(period=="12") drawChart(365)

}

})

</script>
