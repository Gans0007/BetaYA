<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>YA Dashboard</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
  --bg: var(--tg-theme-bg-color, #0f0f10);
  --text: var(--tg-theme-text-color, #ffffff);
  --card: var(--tg-theme-secondary-bg-color, #1b1b1f);
  --muted: rgba(255,255,255,0.65);
  --soft: rgba(255,255,255,0.08);
  --soft2: rgba(0,0,0,0.25);
  --radius: 18px;
}

body{
  font-family: Arial;
  margin:0;
  padding:12px;
  background:var(--bg);
  color:var(--text);
}

h1{
  text-align:center;
  margin:4px 0 12px;
  font-size:20px;
}

.card{
  background:var(--card);
  padding:12px;
  border-radius:var(--radius);
  margin-bottom:10px;
  box-shadow:0 6px 18px var(--soft2);
}

.stats{
  display:flex;
  gap:8px;
}

.stat-box{
  flex:1;
  text-align:center;
  padding:10px;
  border-radius:12px;
  background:var(--soft);
}

.label{
  font-size:12px;
  color:var(--muted);
}

.value{
  font-size:18px;
  font-weight:700;
}

.period-switch{
  display:flex;
  gap:8px;
  margin-bottom:8px;
}

.period-switch button{
  flex:1;
  padding:8px;
  border:0;
  border-radius:12px;
  background:var(--soft);
  color:var(--text);
  font-weight:600;
}

.period-switch button.active{
  background:#2f80ed;
}

canvas{
  width:100%;
  height:180px !important;
}

</style>
</head>

<body>

<h1>🔥 YA Dashboard</h1>

<div class="card stats">

<div class="stat-box">
<div class="label">🔥 Streak</div>
<div class="value" id="streak">-</div>
</div>

<div class="stat-box">
<div class="label">💎 XP</div>
<div class="value" id="xp">-</div>
</div>

<div class="stat-box">
<div class="label">🏆 League</div>
<div class="value" id="league">-</div>
</div>

</div>

<div class="card">

<div class="period-switch">
<button data-period="7" class="active">7D</button>
<button data-period="30">30D</button>
<button data-period="12">1Y</button>
</div>

<canvas id="habitsChart"></canvas>

</div>

<script>

const tg = window.Telegram.WebApp
tg.expand()

loadDashboard()

async function loadDashboard(){

try{

const response = await fetch("https://youramb.digital/api/dashboard",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
initData: tg.initData
})

})

const data = await response.json()

document.getElementById("streak").innerText =
data.streak ?? 0

document.getElementById("xp").innerText =
Math.floor(data.xp ?? 0)

document.getElementById("league").innerText =
data.league ?? "-"

}catch(e){

console.log("API ERROR",e)

}

}

let chart

function randomChecks(length, prob=0.6){
return Array.from({length},()=>Math.random()<prob)
}

function checksToSeries(checks){
let v=0
const out=[]

for(const ok of checks){

if(ok) v+=1
else v=Math.max(0,v-1)

out.push(v)

}

return out
}

function generateData(period){

let labels=[]

if(period===7){
labels=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"]
}

else if(period===30){
labels=Array.from({length:30},(_,i)=>i+1)
}

else{
labels=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]
}

const run=checksToSeries(randomChecks(labels.length,0.55))
const read=checksToSeries(randomChecks(labels.length,0.6))
const water=checksToSeries(randomChecks(labels.length,0.7))

return {labels,run,read,water}

}

function render(period){

const data=generateData(period)

if(chart) chart.destroy()

chart=new Chart(document.getElementById("habitsChart"),{

type:"line",

data:{
labels:data.labels,
datasets:[
{label:"🏃 Пробежка",data:data.run,tension:0.35},
{label:"📚 Чтение",data:data.read,tension:0.35},
{label:"💧 Вода",data:data.water,tension:0.35}
]
},

options:{
responsive:true,
maintainAspectRatio:false
}

})

}

document.querySelectorAll(".period-switch button").forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll(".period-switch button")
.forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

render(parseInt(btn.dataset.period))

}

})

render(7)

</script>

</body>
</html>
