<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Habits</title>

<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/header.css">
<link rel="stylesheet" href="css/habits.css">
<link rel="stylesheet" href="css/navigation.css">
<link rel="stylesheet" href="css/leaderboard.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<!-- ======================
DASHBOARD PAGE
====================== -->

<div id="dashboard-page">

<div class="header">

<div class="profile-card">

<div class="resources-bar">

<div class="resource resource-xp">

<div class="xp-top">
⭐ <span id="xp-text">120 / 300</span>
</div>

<div class="xp-bar">
<div class="xp-fill" id="xp-fill"></div>
</div>

</div>

<div class="resource">
🪙 313
</div>

</div>


<div class="profile-row">

<div class="profile-left">

<img id="player-avatar" class="profile-flag">

<div class="profile-info">

<div class="profile-name" id="player-name">PlayerName</div>
<div class="profile-clan">Не в клане</div>

</div>

</div>


<div class="profile-league">

<div class="league-text">Бронза I</div>
<img src="img/leagues/league_1.png">

</div>

</div>

</div>


<div class="header-calendar">

<div class="header-month" id="month-name">
Март
</div>

<div class="week-days" id="week-days"></div>

</div>

</div>

<div id="habits-list" class="habits"></div>

</div>

<!-- ======================
LEADERBOARD PAGE
====================== -->

<div id="leaderboard-page" style="display:none">

<div class="leaderboard-title">
Лидерборд
</div>

<div id="leaderboard-list"></div>

</div>

</div>


<!-- ======================
BOTTOM NAVIGATION
====================== -->

<div class="bottom-nav">

<a class="nav-item active" onclick="openDashboard()">
<div class="nav-icon">🏠</div>
<div class="nav-label">Привычки</div>
</a>

<a class="nav-item">
<div class="nav-icon">👋</div>
<div class="nav-label">Общение</div>
</a>

<a class="nav-item" onclick="openLeaderboard()">
<div class="nav-icon">🏆</div>
<div class="nav-label">Лидерборд</div>
</a>

<a class="nav-item">
<div class="nav-icon">🤝</div>
<div class="nav-label">Партнёрка</div>
</a>

</div>


<!-- ======================
SCRIPTS
====================== -->

<script type="module" src="js/dashboard.js"></script>
<script src="js/leaderboard.js"></script>

<script>

function openLeaderboard(){

document.getElementById("dashboard-page").style.display="none"
document.getElementById("leaderboard-page").style.display="block"

loadLeaderboard()

}

function openDashboard(){

document.getElementById("dashboard-page").style.display="block"
document.getElementById("leaderboard-page").style.display="none"

}

</script>

</body>
</html>
