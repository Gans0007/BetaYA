<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>YA Dashboard</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    background:#111;
    color:white;
    font-family:Arial;
    padding:20px;
}
.card {
    background:#1e1e1e;
    padding:20px;
    border-radius:15px;
    margin-bottom:15px;
}
.big {
    font-size:42px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="card">
    <div>🔥 Current Streak</div>
    <div id="streak" class="big">...</div>
</div>

<div class="card">
    <div>🆔 Telegram ID</div>
    <div id="tgid">...</div>
</div>

<script>
const tg = window.Telegram?.WebApp;

if (tg) {
    tg.expand();
    load();
}

async function load() {
    const response = await fetch("/api/dashboard", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ initData: tg.initData })
    });

    const data = await response.json();

    document.getElementById("tgid").innerText =
        data.telegram_user_id ?? "no id";

    document.getElementById("streak").innerText =
        data.db_row?.current_streak ?? 0;
}
</script>

</body>
</html>
