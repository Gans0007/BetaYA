<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>YA Dashboard</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<h1>🔥 YA Dashboard</h1>

<div class="card stats">

<div class="stat-box">
<div class="label">🔥 Streak</div>
<div class="value" id="streak">-</div>
</div>

<div class="stat-box">
<div class="label">💎 XP</div>
<div class="value" id="xp">-</div>
</div>

<div class="stat-box">
<div class="label">🏆 League</div>
<div class="value" id="league">-</div>
</div>

</div>

<div class="card">

<div class="period-switch">
<button data-period="7" class="active">7D</button>
<button data-period="30">30D</button>
<button data-period="12">1Y</button>
</div>

<!-- контейнер графика -->
<div class="chart-container">
<canvas id="habitsChart"></canvas>
</div>

</div>

<script src="js/api.js"></script>
<script src="js/chart.js"></script>
<script src="js/app.js"></script>

</body>
</html>
