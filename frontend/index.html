<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YA Streak</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: var(--tg-theme-bg-color, #0f0f10);
  color: var(--tg-theme-text-color, #ffffff);
  font-family: Arial, sans-serif;
}

.card{
  background: var(--tg-theme-secondary-bg-color, #1b1b1f);
  padding:30px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.label{
  font-size:14px;
  opacity:0.7;
}

.value{
  font-size:48px;
  font-weight:700;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
  <div class="label">🔥 Current Streak</div>
  <div class="value" id="streak">...</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

async function loadStreak() {
  try {
    const response = await fetch("https://youramb.digital/api/dashboard", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        initData: tg.initData
      })
    });

    if (!response.ok) throw new Error("API error");

    const data = await response.json();

    document.getElementById("streak").innerText = data.streak ?? 0;

  } catch (error) {
    document.getElementById("streak").innerText = "0";
    console.error(error);
  }
}

loadStreak();
</script>

</body>
</html>
