<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>YA Dashboard</title>

<!-- Telegram Mini App API -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- библиотека графиков -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
  --bg: var(--tg-theme-bg-color, #0f0f10);
  --text: var(--tg-theme-text-color, #ffffff);
  --card: var(--tg-theme-secondary-bg-color, #1b1b1f);
  --muted: rgba(255,255,255,0.65);
  --soft: rgba(255,255,255,0.08);
  --soft2: rgba(0,0,0,0.25);
  --radius: 18px;
}

body{
  font-family: Arial;
  margin:0;
  padding:12px;
  background:var(--bg);
  color:var(--text);
}

h1{
  text-align:center;
  margin:4px 0 12px;
  font-size:20px;
}

.card{
  background:var(--card);
  padding:12px;
  border-radius:var(--radius);
  margin-bottom:10px;
  box-shadow:0 6px 18px var(--soft2);
}

.stats{
  display:flex;
  gap:8px;
}

.stat-box{
  flex:1;
  text-align:center;
  padding:10px;
  border-radius:12px;
  background:var(--soft);
}

.label{
  font-size:12px;
  color:var(--muted);
}

.value{
  font-size:18px;
  font-weight:700;
}

canvas{
  width:100%;
  height:200px !important;
}

</style>
</head>

<body>

<h1>🔥 YA Dashboard</h1>

<!-- Блок общей статистики -->

<div class="card stats">

<div class="stat-box">
<div class="label">🔥 Streak</div>
<div class="value" id="streak">-</div>
</div>

<div class="stat-box">
<div class="label">💎 XP</div>
<div class="value" id="xp">-</div>
</div>

<div class="stat-box">
<div class="label">🏆 League</div>
<div class="value" id="league">-</div>
</div>

</div>

<!-- График привычек -->

<div class="card">

<canvas id="habitsChart"></canvas>

</div>

<script>

/*
========================================
ИНИЦИАЛИЗАЦИЯ TELEGRAM MINI APP
========================================
*/

const tg = window.Telegram.WebApp

// раскрываем mini app на полный экран
tg.expand()

// запускаем загрузку данных
loadDashboard()
loadHabits()

let chart



/*
========================================
ЗАГРУЗКА ОСНОВНОЙ СТАТИСТИКИ
streak / xp / league
========================================
*/

async function loadDashboard(){

try{

const response = await fetch(
"https://youramb.digital/api/dashboard",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
initData: tg.initData
})
})

const data = await response.json()

// отображаем данные на странице

document.getElementById("streak").innerText =
data.streak ?? 0

document.getElementById("xp").innerText =
Math.floor(data.xp ?? 0)

document.getElementById("league").innerText =
data.league ?? "-"

}catch(e){

console.log("Dashboard API error",e)

}

}



/*
========================================
ЗАГРУЗКА ПРИВЫЧЕК ПОЛЬЗОВАТЕЛЯ
========================================
*/

async function loadHabits(){

try{

const response = await fetch(
"https://youramb.digital/api/habits",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
initData: tg.initData
})
})

const data = await response.json()

console.log("Habits from API:", data.habits)

// передаем привычки в функцию отрисовки графика
renderHabits(data.habits)

}catch(e){

console.log("Habits load error",e)

}

}



/*
========================================
ПОСТРОЕНИЕ ГРАФИКА ПРИВЫЧЕК
========================================

мы берем из БД:

habit.name
habit.done_days
habit.days

и строим прогресс привычек
*/

function renderHabits(habits){

// названия привычек
const labels = habits.map(h => h.name)

// прогресс привычки
const progress = habits.map(h =>

Math.round((h.done_days / h.days) * 10)

)

// если график уже был — удаляем
if(chart) chart.destroy()

// создаем новый график
chart = new Chart(document.getElementById("habitsChart"),{

type:"bar",

data:{
labels:labels,
datasets:[{
label:"Прогресс привычек",
data:progress
}]
},

options:{
responsive:true,
maintainAspectRatio:false
}

})

}

</script>

</body>
</html>
