<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Habits</title>

<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/header.css">
<link rel="stylesheet" href="css/habits.css">
<link rel="stylesheet" href="css/navigation.css">
<link rel="stylesheet" href="css/leaderboard.css">
<link rel="stylesheet" href="css/chat.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<!-- ======================
DASHBOARD PAGE
====================== -->

<div id="dashboard-page">

<div class="header">

<div class="profile-card">

<div class="resources-bar">

<div class="resource resource-xp">

<div class="xp-top">
⭐ <span id="xp-text">120 / 300</span>
</div>

<div class="xp-bar">
<div class="xp-fill" id="xp-fill"></div>
</div>

</div>

<div class="resource">
🪙 313
</div>

</div>


<div class="profile-row">

<div class="profile-left">

<img id="player-avatar" class="profile-flag">

<div class="profile-info">

<div class="profile-name" id="player-name">PlayerName</div>
<div class="profile-clan">Не в клане</div>

</div>

</div>


<div class="profile-league">

<div class="league-text">Бронза I</div>
<img src="img/leagues/league_1.png">

</div>

</div>

</div>


<div class="header-calendar">

<div class="header-month" id="month-name">
Март
</div>

<div class="week-days" id="week-days"></div>

</div>

</div>

<div id="habits-list" class="habits"></div>

</div>

<!-- ======================
LEADERBOARD PAGE
====================== -->

<div id="leaderboard-page" style="display:none">

<div class="leaderboard-title">
Лидерборд
</div>

<div id="leaderboard-list"></div>

</div>

</div>



<!-- ==================================================================
CHAT PAGE
================================================================== -->

<div id="chat-page" style="display:none">

<div class="chat-container">

<div class="clan-block">

<div class="clan-title">
Вступи в клан или создай новый!
</div>

<div class="clan-row">

<div class="clan-sub">
Найди клан или создай новый
</div>

<button class="clan-btn">
Показать
</button>

</div>

</div>


<div class="chat-title">
Общение
</div>


<div class="chat-tabs">

<div class="chat-tab active">
В сети
</div>

<div class="chat-tab">
Список лидеров
</div>

</div>


<div class="friends-list">

<div class="friend-card">

<div class="friend-left">

<img src="img/avatars/avatar1.png" class="friend-avatar">

<div class="friend-info">

<div class="friend-name">ТОЛЬ</div>
<div class="friend-status">• online</div>

</div>

</div>

<div class="friend-right">

<img src="img/icons/cup.png" class="cup-icon">
<span>0</span>

</div>

</div>


<div class="friend-card">

<div class="friend-left">

<img src="img/avatars/avatar1.png" class="friend-avatar">

<div class="friend-info">

<div class="friend-name">ТОЛЬ</div>
<div class="friend-status">• online</div>

</div>

</div>

<div class="friend-right">

<img src="img/icons/cup.png" class="cup-icon">
<span>0</span>

</div>

</div>

</div>


<div class="add-friend">

<button class="add-friend-btn">
+ Добавляй друзей!
</button>

</div>

</div>

</div>



<!-- ======================
BOTTOM NAVIGATION
====================== -->

<div class="bottom-nav">

<div class="nav-item active" data-page="dashboard" onclick="openDashboard()">

<img src="img/nav/habits.png" class="nav-icon">

<span class="nav-label">Привычки</span>

</div>

<div class="nav-item" data-page="chat" onclick="openChat()">>

<img src="img/nav/chat.png" class="nav-icon">

<span class="nav-label">Общение</span>

</div>

<div class="nav-item" data-page="leaderboard" onclick="openLeaderboard()">

<img src="img/nav/leaderboard.png" class="nav-icon">

<span class="nav-label">Рейтинг</span>

</div>

<div class="nav-item" data-page="partners">

<img src="img/nav/partners.png" class="nav-icon">

<span class="nav-label">Партнерка</span>

</div>

</div>


<!-- ======================
SCRIPTS
====================== -->

<script>

const tg = window.Telegram.WebApp
tg.ready()

const initData = tg.initData

window.initData = initData

</script>

<script type="module" src="js/dashboard.js"></script>
<script src="js/leaderboard.js"></script>
<script src="js/navigation.js"></script>

<script>

function openLeaderboard(){

document.getElementById("dashboard-page").style.display="none"
document.getElementById("leaderboard-page").style.display="block"
document.getElementById("chat-page").style.display="none"

loadLeaderboard()

}

function openDashboard(){

document.getElementById("dashboard-page").style.display="block"
document.getElementById("leaderboard-page").style.display="none"
document.getElementById("chat-page").style.display="none"

}

function openChat(){

document.getElementById("dashboard-page").style.display="none"
document.getElementById("leaderboard-page").style.display="none"
document.getElementById("chat-page").style.display="block"

}

</script>

</body>
</html>
